<!-- 注册信息 -->

                <input type="checkbox" name="hobby" value="game">game <br>
        <input type="checkbox" name="userAgreement" checked="checked">同意用户协议 <br>
        <input type="submit" name="submit"> <input type="reset" name="Reset"> <br>
